(function () {
  var DEFAULT_RATE = 455.46;
  var THEME_KEY = 'colon-split-theme';
  var rate = DEFAULT_RATE;
  var people = 2;
  var mobileTab = 'convert';
  /** @type {'usd'|'crc'} currency shown on top and driving conversion */
  var inputCurrency = 'crc';

  function $(id) { return document.getElementById(id); }

  function toast(msg) {
    var el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () {
      el.classList.remove('show');
      el.textContent = '';
    }, 2200);
  }

  function fmtUSD(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtCRC(n) {
    return '₡' + Math.round(n).toLocaleString('en-US');
  }

  function parseAmount(str) {
    if (str == null) return NaN;
    var s = String(str).replace(/,/g, '').trim();
    if (!s || s === '.' || s === '-' || s === '-.') return NaN;
    return parseFloat(s);
  }

  /** Live thousands separators while typing (CRC — whole colones). */
  function formatCrcTyping(raw) {
    var s = String(raw).replace(/,/g, '').replace(/[^\d]/g, '');
    if (!s) return '';
    return Number(s).toLocaleString('en-US');
  }

  /** Live commas + up to 2 decimals while typing (USD). */
  function formatUsdTyping(raw) {
    var s = String(raw).replace(/,/g, '');
    var endsDot = s.length > 0 && s.charAt(s.length - 1) === '.';
    s = s.replace(/[^\d.]/g, '');
    var dot = s.indexOf('.');
    var intStr = dot === -1 ? s : s.slice(0, dot);
    var decStr = dot === -1 ? '' : s.slice(dot + 1).replace(/\./g, '').slice(0, 2);
    intStr = intStr.replace(/\D/g, '');
    if (!intStr && !decStr && !endsDot) return '';
    var intFmt = intStr === '' ? '0' : Number(intStr).toLocaleString('en-US');
    if (dot === -1 && !endsDot) return intFmt;
    if (endsDot && !decStr) return intFmt + '.';
    return intFmt + '.' + decStr;
  }

  function applyTypingFormat(el, formatter) {
    var neu = formatter(el.value);
    if (neu !== el.value) {
      el.value = neu;
      try {
        el.setSelectionRange(neu.length, neu.length);
      } catch (_) {}
    }
  }

  function formatUsdOut(n) {
    if (!isFinite(n)) return '';
    var r = Math.round(n * 100) / 100;
    return r.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatCrcOut(n) {
    if (!isFinite(n)) return '';
    return Math.round(n).toLocaleString('en-US');
  }

  function formatBillField() {
    var el = $('bill-amount');
    var cur = $('bill-currency').value;
    var v = parseAmount(el.value);
    if (!isFinite(v) || v <= 0) return;
    el.value = cur === 'CRC' ? formatCrcOut(v) : formatUsdOut(v);
  }

  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    var btn = $('btn-theme');
    btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
    btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
    try { localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light'); } catch (_) {}
  }

  function initTheme() {
    var stored = null;
    try { stored = localStorage.getItem(THEME_KEY); } catch (_) {}
    if (stored === 'dark' || stored === 'light') {
      applyTheme(stored === 'dark');
      return;
    }
    try {
      applyTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
    } catch (_) {
      applyTheme(false);
    }
  }

  function syncRate() {
    var el = $('rate-input');
    if (document.activeElement !== el) {

    }
    $('rate-display').textContent = rate.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function applyRateFromField() {

    var v = parseAmount(el.value);
    if (!isFinite(v) || v <= 0) return false;
    rate = v;
    $('rate-display').textContent = rate.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return true;
  }

  function updateInputLabels() {
    var usdBox = $('box-usd');
    var crcBox = $('box-crc');
    var usdLabel = $('label-usd');
    var crcLabel = $('label-crc');
    if (inputCurrency === 'usd') {

      usdLabel.innerHTML = 'US Dollars <span class="muted input-tag">(input)</span>';
      crcLabel.textContent = 'Costa Rican Colones';
    } else {
      crcBox.classList.add('is-input');

      usdLabel.textContent = 'US Dollars';

    var stack = $('convert-stack');
    var usd = $('box-usd');
    var crc = $('box-crc');
    var divider = stack.querySelector('.inset-divider');
    if (inputCurrency === 'usd') {
      stack.appendChild(usd);
      if (divider) stack.appendChild(divider);
      stack.appendChild(crc);
    } else {

  function recalcFromInput() {
    var usdEl = $('usd-input');
    var crcEl = $('crc-input');
    if (inputCurrency === 'usd') {
      var usd = parseAmount(usdEl.value);
      if (isNaN(usd) || usd === 0) {
        if (document.activeElement !== crcEl) crcEl.value = '';
        return;
      }
      if (document.activeElement !== crcEl) crcEl.value = formatCrcOut(usd * rate);
    } else {
      var crc = parseAmount(crcEl.value);
      if (isNaN(crc) || crc === 0) {
        if (document.activeElement !== usdEl) usdEl.value = '';
        return;
      }
      if (document.activeElement !== usdEl) usdEl.value = formatUsdOut(crc / rate);
    }
  }

  function setSumStack(id, mainHtml, altText) {
    var el = $(id);
    el.innerHTML = '<span class="sum-main">' + mainHtml + '</span><span class="sum-alt">' + altText + '</span>';
  }

  function calcSplit() {
    var billRaw = $('bill-amount').value;
    var tip = parseFloat($('tip-input').value) || 0;
    $('people-count').textContent = String(people);

    if (!String(billRaw).trim()) {
      $('line-subtotal').textContent = '—';
      $('line-tip').innerHTML = '<span class="sum-main">— <span class="sum-pct">(' + tip + '%)</span></span>';
      $('line-total').textContent = '—';
      $('per-primary').textContent = '—';
      $('per-secondary').textContent = '—';
      return;
    }

    var bill = parseAmount(billRaw) || 0;
    var cur = $('bill-currency').value;
    var subUSD = cur === 'USD' ? bill : bill / rate;
    var tipUSD = subUSD * (tip / 100);
    var totalUSD = subUSD + tipUSD;
    var perUSD = people > 0 ? totalUSD / people : 0;
    var perCRC = perUSD * rate;

    var subCRC = subUSD * rate;
    var tipCRC = tipUSD * rate;
    var totalCRC = totalUSD * rate;

    setSumStack('line-subtotal',
      cur === 'CRC' ? fmtCRC(subCRC) : fmtUSD(subUSD),
      cur === 'CRC' ? fmtUSD(subUSD) : fmtCRC(subCRC));
    setSumStack('line-tip',
      (cur === 'CRC' ? fmtCRC(tipCRC) : fmtUSD(tipUSD)) + ' <span class="sum-pct">(' + tip + '%)</span>',
      cur === 'CRC' ? fmtUSD(tipUSD) : fmtCRC(tipCRC));
    setSumStack('line-total',
      cur === 'CRC' ? fmtCRC(totalCRC) : fmtUSD(totalUSD),
      cur === 'CRC' ? fmtUSD(totalUSD) : fmtCRC(totalCRC));

    var perBlock = $('per-person-block');
    perBlock.classList.remove('src-crc', 'src-usd');
    perBlock.classList.add(cur === 'CRC' ? 'src-crc' : 'src-usd');
    var perPri = $('per-primary');
    var perSec = $('per-secondary');
    if (cur === 'CRC') {
      perPri.textContent = fmtCRC(perCRC);
      perPri.className = 'per-line per-src per-crc';
      perSec.textContent = fmtUSD(perUSD);
      perSec.className = 'per-line per-alt per-usd';
    } else {
      perPri.textContent = fmtUSD(perUSD);
      perPri.className = 'per-line per-src per-usd';
      perSec.textContent = fmtCRC(perCRC);
      perSec.className = 'per-line per-alt per-crc';
    }
  }

  function setTip(p) {
    p = Math.max(0, Math.min(100, p));
    $('tip-input').value = p;
    var btns = document.querySelectorAll('.tip-btn');
    for (var i = 0; i < btns.length; i++) {
      var on = Number(btns[i].getAttribute('data-tip')) === p;
      btns[i].classList.toggle('chip-on', on);
    }
    calcSplit();
  }

  function getShareCategory() {
    var on = document.querySelector('.share-cat.chip-on');
    if (!on) return { emoji: '📋', cat: 'Other', title: 'Other' };
    return {
      emoji: on.getAttribute('data-emoji') || '📋',
      cat: on.getAttribute('data-cat') || 'Other',
      title: on.getAttribute('data-title') || on.getAttribute('data-cat') || 'Other'
    };
  }

  function buildShare() {
    var bill = parseAmount($('bill-amount').value) || 0;
    var cur = $('bill-currency').value;
    var tip = parseFloat($('tip-input').value) || 0;
    var subUSD = cur === 'USD' ? bill : bill / rate;
    var totalUSD = subUSD * (1 + tip / 100);
    var perUSD = people > 0 ? totalUSD / people : 0;
    var perCRC = perUSD * rate;
    var meta = getShareCategory();
    var charge = ($('share-charge-input') && $('share-charge-input').value) ? $('share-charge-input').value.trim() : '';
    var headline = meta.emoji;
    if (charge) headline += ' ' + charge;
    else headline += ' ' + (meta.title || meta.cat);
    var lines = [
      headline,
      '',
      'Colón Split',
      'Bill: ' + (cur === 'CRC' ? fmtCRC(bill) : fmtUSD(bill)),
      'Tip: ' + tip + '% · ' + people + ' people',
      'Total: ' + (cur === 'CRC' ? fmtCRC(totalUSD * rate) : fmtUSD(totalUSD)),
      'Each pays: ' + fmtUSD(perUSD) + ' (' + fmtCRC(perCRC) + ')',
      'Rate: 1 USD = ' + rate.toFixed(2) + ' CRC'
    ];
    return lines.join('\n');
  }

  function focusShareChargeInput(inp) {
    if (!inp) inp = $('share-charge-input');
    if (!inp) return;
    function attempt() {
      try {
        inp.focus({ preventScroll: true });
      } catch (_) {
        try { inp.focus(); } catch (_2) {}
      }
      try {
        inp.setSelectionRange(inp.value.length, inp.value.length);
      } catch (_) {}
    }
    attempt();
    requestAnimationFrame(function () {
      requestAnimationFrame(attempt);
    });
    setTimeout(attempt, 80);
    setTimeout(attempt, 220);
  }

  function openShareSheet() {
    ensureOverlayClean();
    blurFocusFromHiddenPanel();
    var sheet = $('share-sheet');
    sheet.hidden = false;
    sheet.setAttribute('aria-hidden', 'false');
    document.body.classList.add('sheet-open');
    var on = document.querySelector('.share-cat.chip-on');
    var inp = $('share-charge-input');
    if (inp && on && !inp.value.trim()) {
      var title = on.getAttribute('data-title');
      if (title) inp.value = title;
    }
  }

  function closeShareSheet() {
    var sheet = $('share-sheet');
    sheet.hidden = true;
    sheet.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('sheet-open');
    shareInFlight = false;
  }

  function ensureOverlayClean() {
    shareInFlight = false;
    var sheet = $('share-sheet');
    if (sheet && sheet.hidden) {
      document.body.classList.remove('sheet-open');
    }
  }

  /** iOS breaks touches/share if focus stays inside display:none panel after tab switch. */
  function blurFocusFromHiddenPanel() {
    var ae = document.activeElement;
    if (!ae || ae === document.body || ae === document.documentElement) return;
    if (typeof ae.blur !== 'function') return;
    var narrow = !window.matchMedia('(min-width: 900px)').matches;
    if (!narrow) return;
    var conv = $('panel-convert');
    var spl = $('panel-split');
    if (mobileTab === 'split' && conv && conv.contains(ae)) ae.blur();
    if (mobileTab === 'convert' && spl && spl.contains(ae)) ae.blur();
  }

  function setPanelInert() {
    var conv = $('panel-convert');
    var spl = $('panel-split');
    var narrow = !window.matchMedia('(min-width: 900px)').matches;
    if (!narrow) {
      conv.removeAttribute('inert');
      spl.removeAttribute('inert');
      return;
    }
    if (mobileTab === 'split') {
      conv.setAttribute('inert', '');
      spl.removeAttribute('inert');
    } else {
      spl.setAttribute('inert', '');
      conv.removeAttribute('inert');
    }
  }

  function restoreAppChrome() {
    closeShareSheet();
    shareInFlight = false;
    document.body.classList.remove('sheet-open');
    blurFocusFromHiddenPanel();
    var inp = $('share-charge-input');
    if (inp && document.activeElement === inp) {
      try { inp.blur(); } catch (_) {}
    }
  }

  function activateMobileTab(tab) {
    closeShareSheet();
    mobileTab = tab;
    var tabs = document.querySelectorAll('[data-tab]');
    for (var x = 0; x < tabs.length; x++) {
      var on = tabs[x].getAttribute('data-tab') === mobileTab;
      tabs[x].classList.toggle('tab-active', on);
      tabs[x].setAttribute('aria-selected', on ? 'true' : 'false');
    }
    blurFocusFromHiddenPanel();
    ensureOverlayClean();
    applyLayout();
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { toast('Copied'); }).catch(function () {
        window.prompt('Copy this text:', text);
      });
    } else {
      window.prompt('Copy this text:', text);
      toast('Select and copy');
    }
  }

  function isAppleMobile() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  /** Call synchronously from a tap handler — iOS requires a fresh user gesture. */
  function shareSystemSheet(text) {
    if (typeof navigator.share !== 'function') {
      return Promise.reject(new Error('unsupported'));
    }
    var payload = { text: String(text) };
    return navigator.share(payload);
  }

  var shareInFlight = false;

  function shareOrCopySummary() {
    if (shareInFlight) return;
    if (!String($('bill-amount').value || '').trim()) {
      toast('Enter a bill total first');
      return;
    }
    var text = buildShare();
    blurFocusFromHiddenPanel();
    var ae = document.activeElement;
    if (ae && ae !== document.body && typeof ae.blur === 'function') {
      ae.blur();
    }

    /* Dismiss emoji sheet before iOS share so tab bar works when user returns / cancels */
    closeShareSheet();

    shareInFlight = true;
    var done = function () {
      shareInFlight = false;
    };

    if (typeof navigator.share !== 'function') {
      done();
      if (isAppleMobile()) {
        try {
          window.location.href = 'sms:&body=' + encodeURIComponent(text);
          closeShareSheet();
          return;
        } catch (_) {}
      }
      copyText(text);
      closeShareSheet();
      return;
    }

    var p;
    try {
      p = shareSystemSheet(text);
    } catch (err) {
      done();
      copyText(text);
      closeShareSheet();
      return;
    }

    p.then(function () {
      done();
      toast('Shared');
    }).catch(function (err) {
      done();
      if (err && err.name === 'AbortError') return;
      if (isAppleMobile()) {
        try {
          window.location.href = 'sms:&body=' + encodeURIComponent(text);
          toast('Opening Messages…');
          return;
        } catch (_) {}
      }
      copyText(text);
    });
  }

  function applyLayout() {
    var grid = $('main-grid');
    var wide = window.matchMedia('(min-width: 900px)').matches;
    if (wide) {
      grid.classList.remove('show-convert', 'show-split');
      $('panel-convert').classList.remove('is-hidden');
      $('panel-split').classList.remove('is-hidden');
      setPanelInert();
      return;
    }
    grid.classList.toggle('show-convert', mobileTab === 'convert');
    grid.classList.toggle('show-split', mobileTab === 'split');
    $('panel-convert').classList.remove('is-hidden');
    $('panel-split').classList.remove('is-hidden');
    setPanelInert();
    blurFocusFromHiddenPanel();
  }

  function clearConverter() {
    $('usd-input').value = '';
    $('crc-input').value = '';
    var top = inputCurrency === 'usd' ? $('usd-input') : $('crc-input');
    try { top.focus(); } catch (_) {}
    calcSplit();
    toast('Cleared');
  }

  function swapConvert() {
    inputCurrency = inputCurrency === 'usd' ? 'crc' : 'usd';
    orderConvertBoxes();
    recalcFromInput();
    calcSplit();
    toast(inputCurrency === 'crc' ? 'Colones on top (input)' : 'Dollars on top (input)');
  }

  var eggTapTimes = [];
  var eggRunning = false;
  var eggFwFrame = null;

  function cleanupEasterEgg() {
    eggRunning = false;
    if (eggFwFrame) {
      cancelAnimationFrame(eggFwFrame);
      eggFwFrame = null;
    }
    var layer = $('fx-layer');
    var canvas = $('fx-fireworks');
    if (layer) {
      layer.hidden = true;
      layer.setAttribute('aria-hidden', 'true');
    }
    if (canvas) {
      var ctx = canvas.getContext('2d');
      if (ctx) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
  }

  function setupFireworksCanvas(canvas) {
    var ctx = canvas.getContext('2d', { alpha: true });
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    return { ctx: ctx, w: w, h: h };
  }

  function runFireworks(canvas) {
    var setup = setupFireworksCanvas(canvas);
    var ctx = setup.ctx;
    var w = setup.w;
    var h = setup.h;
    var rockets = [];
    var particles = [];
    var palette = [
      ['#ff6b6b', '#ffd93d', '#ffffff'],
      ['#4ecdc4', '#a8e6cf', '#ffffff'],
      ['#ff9ff3', '#f368e0', '#ffffff'],
      ['#54a0ff', '#5f27cd', '#48dbfb'],
      ['#ff9f43', '#ff6348', '#ffeaa7']
    ];
    var SHOW_MAX_MS = 5000;
    var LAUNCH_STOP_MS = 3200;
    var HARD_END_MS = 6200;
    var startMs = performance.now();
    var lastMs = startMs;
    var launchAcc = 0;
    var launchEvery = 0.34;

    function ringBurst(x, y, pal) {
      var n = 72;
      var i;
      for (i = 0; i < n; i++) {
        var ang = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.18;
        var spd = 160 + Math.random() * 240;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 1,
          decay: 0.55 + Math.random() * 0.35,
          c: pal[Math.floor(Math.random() * pal.length)],
          trail: [],
          spark: Math.random() < 0.48
        });
      }
      for (i = 0; i < 24; i++) {
        var a2 = Math.random() * Math.PI * 2;
        var sp2 = 40 + Math.random() * 90;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(a2) * sp2,
          vy: Math.sin(a2) * sp2,
          life: 0.85,
          decay: 0.7 + Math.random() * 0.4,
          c: '#fff',
          trail: [],
          spark: true
        });
      }
    }

    function launchRocket() {
      rockets.push({
        x: w * (0.16 + Math.random() * 0.68),
        y: h + 10,
        vy: -240 - Math.random() * 130,
        targetY: h * (0.07 + Math.random() * 0.44),
        pal: palette[Math.floor(Math.random() * palette.length)],
        trail: []
      });
    }

    function drawRocketTrail(rk) {
      ctx.fillStyle = '#fffaf0';
      ctx.beginPath();
      ctx.arc(rk.x, rk.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
      if (rk.trail.length < 2) return;
      var t;
      ctx.strokeStyle = 'rgba(255, 230, 200, 0.65)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rk.trail[0].x, rk.trail[0].y);
      for (t = 1; t < rk.trail.length; t++) {
        ctx.lineTo(rk.trail[t].x, rk.trail[t].y);
      }
      ctx.stroke();
    }

    function shouldEndFireworks(elapsedMs) {
      if (elapsedMs < SHOW_MAX_MS) return false;
      if (elapsedMs >= HARD_END_MS) return true;
      return rockets.length === 0 && particles.length === 0;
    }

    function frame(now) {
      var dt = Math.min(0.032, (now - lastMs) / 1000);
      if (dt <= 0) dt = 0.016;
      lastMs = now;
      var elapsedMs = now - startMs;

      ctx.clearRect(0, 0, w, h);

      if (elapsedMs < LAUNCH_STOP_MS) {
        launchAcc += dt;
        while (launchAcc >= launchEvery) {
          launchAcc -= launchEvery;
          launchRocket();
        }
      }

      var ri;
      for (ri = rockets.length - 1; ri >= 0; ri--) {
        var rk = rockets[ri];
        rk.trail.push({ x: rk.x, y: rk.y });
        if (rk.trail.length > 14) rk.trail.shift();
        rk.y += rk.vy * dt;
        rk.vy += 18 * dt;
        drawRocketTrail(rk);
        if (rk.y <= rk.targetY || rk.vy >= -20) {
          ringBurst(rk.x, rk.y, rk.pal);
          rockets.splice(ri, 1);
        }
      }

      ctx.globalCompositeOperation = 'lighter';
      var j;
      for (j = particles.length - 1; j >= 0; j--) {
        var p = particles[j];
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 8) p.trail.shift();
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 95 * dt;
        p.vx *= Math.pow(0.985, dt * 60);
        p.life -= p.decay * dt;
        if (p.life <= 0) {
          particles.splice(j, 1);
          continue;
        }
        var alpha = Math.min(1, p.life);
        ctx.globalAlpha = alpha;
        if (p.spark && p.trail.length > 1) {
          ctx.strokeStyle = p.c;
          ctx.lineWidth = 1.2 + alpha;
          ctx.beginPath();
          ctx.moveTo(p.trail[0].x, p.trail[0].y);
          var ti;
          for (ti = 1; ti < p.trail.length; ti++) {
            ctx.lineTo(p.trail[ti].x, p.trail[ti].y);
          }
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        } else {
          ctx.fillStyle = p.c;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 1.4 + alpha * 0.8, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';

      if (!shouldEndFireworks(elapsedMs)) {
        eggFwFrame = requestAnimationFrame(frame);
      } else {
        eggFwFrame = null;
        ctx.clearRect(0, 0, w, h);
        cleanupEasterEgg();
      }
    }

    launchRocket();
    launchRocket();
    eggFwFrame = requestAnimationFrame(frame);
  }

  function runEasterEgg() {
    if (eggRunning) return;
    eggRunning = true;
    closeShareSheet();
    blurFocusFromHiddenPanel();
    var layer = $('fx-layer');
    var canvas = $('fx-fireworks');
    if (!layer || !canvas) {
      eggRunning = false;
      return;
    }
    layer.hidden = false;
    layer.setAttribute('aria-hidden', 'false');
    runFireworks(canvas);
  }

  function onRateEasterTap() {
    if (eggRunning) return;
    var now = Date.now();
    eggTapTimes.push(now);
    eggTapTimes = eggTapTimes.filter(function (t) { return now - t <= 3000; });
    if (eggTapTimes.length >= 5) {
      eggTapTimes = [];
      runEasterEgg();
    }
  }

  function amountForSplitCurrency(targetCur) {
    var crc = parseAmount($('crc-input').value);
    var usd = parseAmount($('usd-input').value);
    if (targetCur === 'CRC') {
      if (crc > 0) return { cur: 'CRC', amt: formatCrcOut(crc) };
      if (usd > 0 && rate > 0) return { cur: 'CRC', amt: formatCrcOut(usd * rate) };
    } else {
      if (usd > 0) return { cur: 'USD', amt: formatUsdOut(usd) };
      if (crc > 0 && rate > 0) return { cur: 'USD', amt: formatUsdOut(crc / rate) };
    }
    return null;
  }

  function sendToBillSplit(targetCur) {
    var picked = amountForSplitCurrency(targetCur);
    if (!picked) {
      toast('Enter an amount in the converter first');
      return;
    }
    $('bill-currency').value = picked.cur;
    $('bill-amount').value = picked.amt;
    calcSplit();
    blurFocusFromHiddenPanel();
    if (document.activeElement && document.activeElement.blur) {
      document.activeElement.blur();
    }
    ensureOverlayClean();
    if (!window.matchMedia('(min-width: 900px)').matches) {
      activateMobileTab('split');
    }
    toast(targetCur === 'CRC' ? 'Bill set in colones' : 'Bill set in dollars');
  }

  function fetchRate() {
    var btn = $('btn-fetch-rate');
    if (!btn) return;
    btn.disabled = true;
    btn.classList.add('is-spinning');
    fetch('https://open.er-api.com/v6/latest/USD')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var crc = data && data.rates && data.rates.CRC;
        if (!crc) throw new Error('no rate');
        rate = crc;
        syncRate();
        recalcFromInput();
        calcSplit();
        $('rate-meta').textContent = 'Live rate · ' + new Date().toLocaleString();
        toast('Rate updated');
      })
      .catch(function () {
        toast('Rate fetch blocked — use manual rate');
      })
      .finally(function () {
        btn.disabled = false;
        btn.classList.remove('is-spinning');
      });
  }

  function wire() {
    $('btn-theme').addEventListener('click', function () {
      var dark = document.documentElement.getAttribute('data-theme') !== 'dark';
      applyTheme(dark);
    });

    var eggTrig = $('rate-easter-trigger');
    if (eggTrig) {
      eggTrig.addEventListener('pointerup', function (e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        onRateEasterTap();
      });
    }

    $('rate-input').addEventListener('input', function () {
      applyTypingFormat(this, formatUsdTyping);
      if (applyRateFromField()) {
        recalcFromInput();
        calcSplit();
      }
    });
    $('rate-input').addEventListener('blur', function () {
      if (!applyRateFromField()) syncRate();
      else $('rate-input').value = formatUsdOut(rate);
    });
    $('btn-reset-rate').addEventListener('click', function () {
      rate = DEFAULT_RATE;
      syncRate();
      recalcFromInput();
      calcSplit();
      toast('Rate reset');
    });
    $('btn-fetch-rate').addEventListener('click', fetchRate);

    $('usd-input').addEventListener('focus', function () { setInputCurrency('usd'); });
    $('usd-input').addEventListener('input', function () {
      applyTypingFormat(this, formatUsdTyping);
      setInputCurrency('usd');
      recalcFromInput();
      calcSplit();
    });
    $('crc-input').addEventListener('focus', function () { setInputCurrency('crc'); });
    $('crc-input').addEventListener('input', function () {
      applyTypingFormat(this, formatCrcTyping);
      setInputCurrency('crc');
      recalcFromInput();
      calcSplit();
    });
    $('btn-swap').addEventListener('click', swapConvert);
    $('btn-clear').addEventListener('click', clearConverter);

    $('btn-split-crc').addEventListener('click', function () { sendToBillSplit('CRC'); });
    $('btn-split-usd').addEventListener('click', function () { sendToBillSplit('USD'); });

    $('bill-amount').addEventListener('input', function () {
      var cur = $('bill-currency').value;
      applyTypingFormat(this, cur === 'CRC' ? formatCrcTyping : formatUsdTyping);
      calcSplit();
    });
    $('bill-amount').addEventListener('blur', formatBillField);
    $('bill-currency').addEventListener('change', function () {
      formatBillField();
      calcSplit();
    });
    $('tip-input').addEventListener('input', calcSplit);
    $('people-minus').addEventListener('click', function () { people = Math.max(1, people - 1); calcSplit(); });
    $('people-plus').addEventListener('click', function () { people = Math.min(30, people + 1); calcSplit(); });

    var tipBtns = document.querySelectorAll('.tip-btn');
    for (var i = 0; i < tipBtns.length; i++) {
      tipBtns[i].addEventListener('click', function () { setTip(Number(this.getAttribute('data-tip'))); });
    }

    $('btn-copy-breakdown').addEventListener('click', openShareSheet);

    $('share-cancel').addEventListener('click', closeShareSheet);
    $('share-scrim').addEventListener('click', closeShareSheet);
    $('share-confirm').addEventListener('click', function (e) {
      e.preventDefault();
      shareOrCopySummary();
    });

    $('share-charge-clear').addEventListener('click', function () {
      var inp = $('share-charge-input');
      inp.value = '';
      try { inp.focus(); } catch (_) {}
    });

    var shareCats = document.querySelectorAll('.share-cat');
    for (var s = 0; s < shareCats.length; s++) {
      shareCats[s].addEventListener('click', function () {
        for (var c = 0; c < shareCats.length; c++) shareCats[c].classList.remove('chip-on');
        this.classList.add('chip-on');
        var cat = this.getAttribute('data-cat') || '';
        var title = this.getAttribute('data-title') || '';
        var inp = $('share-charge-input');
        if (!inp) return;
        if (cat === 'Other') {
          inp.value = '';
          focusShareChargeInput(inp);
        } else if (title) {
          inp.value = title;
        }
      });
    }

    var tabs = document.querySelectorAll('[data-tab]');
    for (var t = 0; t < tabs.length; t++) {
      tabs[t].addEventListener('click', function () {
        activateMobileTab(this.getAttribute('data-tab'));
      });
    }
    window.addEventListener('resize', applyLayout);
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) restoreAppChrome();
    });
    window.addEventListener('pageshow', function () {
      restoreAppChrome();
    });
  }

  function boot() {
    try {
      initTheme();
      syncRate();
      updateInputLabels();
      recalcFromInput();
      setTip(0);
      calcSplit();
      applyLayout();
      wire();
    } catch (err) {
      document.body.classList.add('boot-failed');
      console.error(err);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () {});
    });
  }
})();
  </script>
</body>
</html>
